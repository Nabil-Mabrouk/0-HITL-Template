name: CI — Tests & Qualité

# ── Déclencheurs ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Annuler les runs précédents sur la même branche pour économiser les minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Variables d'environnement globales ────────────────────────────────────────
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Tests Backend (pytest)
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  backend-tests:
    name: "🐍 Backend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key-minimum-32-chars-jwt
          DATABASE_URL: sqlite:///./test.db
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: AdminTest123!
          SMTP_HOST: localhost
          SMTP_PORT: "587"
          SMTP_USER: test@test.com
          SMTP_PASSWORD: test
          FRONTEND_URL: http://localhost:5173
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=app \
            --cov-report=xml:coverage-unit.xml \
            -m "unit"

      - name: Run integration tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key-minimum-32-chars-jwt
          DATABASE_URL: sqlite:///./test.db
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: AdminTest123!
          SMTP_HOST: localhost
          SMTP_PORT: "587"
          SMTP_USER: test@test.com
          SMTP_PASSWORD: test
          FRONTEND_URL: http://localhost:5173
        run: |
          pytest tests/integration/ -v --tb=short \
            --cov=app \
            --cov-append \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=40

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Lint Backend
# ═══════════════════════════════════════════════════════════════════════════════
  backend-lint:
    name: "🔍 Backend Lint"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --output-format=github

      - name: Format check with ruff
        run: ruff format app/ --check

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Tests Frontend (Vitest)
# ═══════════════════════════════════════════════════════════════════════════════
  frontend-tests:
    name: "⚛️  Frontend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          VITE_API_URL: http://localhost:8000

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 4 — Lint & TypeScript Check Frontend
# ═══════════════════════════════════════════════════════════════════════════════
  frontend-lint:
    name: "🔍 Frontend Lint + TypeCheck"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 5 — Build de production (validation)
# ═══════════════════════════════════════════════════════════════════════════════
  build-check:
    name: "🏗️  Build Check"
    runs-on: ubuntu-latest
    needs: [frontend-tests, frontend-lint]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for production
        run: npm run build
        env:
          VITE_API_URL: https://api.{{PROJECT_DOMAIN}}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 6 — Audit de sécurité des dépendances
# ═══════════════════════════════════════════════════════════════════════════════
  security-audit:
    name: "🔒 Security Audit"
    runs-on: ubuntu-latest
    # Ne bloque pas le CI — juste un avertissement
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit Python packages
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --format=json -o pip-audit-results.json || true
          cat pip-audit-results.json

      - name: Audit npm packages
        run: |
          cd frontend
          npm audit --audit-level=high || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit
          path: pip-audit-results.json

# ═══════════════════════════════════════════════════════════════════════════════
# JOB FINAL — Statut global (requis pour les branch protections)
# ═══════════════════════════════════════════════════════════════════════════════
  ci-status:
    name: "✅ CI Status"
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - backend-lint
      - frontend-tests
      - frontend-lint
      - build-check
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.build-check.result }}" == "failure" ]]; then
            echo "❌ Un ou plusieurs jobs ont échoué"
            exit 1
          fi
          echo "✅ Tous les jobs ont réussi"
