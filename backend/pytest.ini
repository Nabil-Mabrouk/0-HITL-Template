[pytest]
# ─── Configuration pytest pour Z-HITL ────────────────────────────────────────

# Répertoire de découverte des tests
testpaths = tests

# Mode asyncio : auto = pas besoin de @pytest.mark.asyncio sur chaque test
asyncio_mode = auto

# Affichage verbeux par défaut
addopts =
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=60

# Marqueurs personnalisés (évite les warnings)
markers =
    unit: Tests unitaires (sans base de données)
    integration: Tests d'intégration (avec base de données en mémoire)
    e2e: Tests end-to-end (nécessite le serveur complet)
    slow: Tests lents (à exclure en CI rapide avec -m "not slow")

# Variables d'environnement pour les tests
env =
    ENVIRONMENT=test
    SECRET_KEY=test-secret-key-minimum-32-chars-for-jwt-signing
    DATABASE_URL=sqlite:///./test.db
    ADMIN_EMAIL=admin@test.com
    ADMIN_PASSWORD=AdminTest123!
    SMTP_HOST=localhost
    SMTP_PORT=587
    SMTP_USER=test@test.com
    SMTP_PASSWORD=test
    FRONTEND_URL=http://localhost:5173
